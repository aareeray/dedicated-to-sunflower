<head>

  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="" />
  <!-- TEMP ERROR REPORTER -->
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;z-index:999999;background:red;color:white;padding:20px;width:100%;font-size:16px;';
      d.innerHTML = '<b>JS ERROR:</b> ' + msg + '<br>' + (err ? err.stack : '');
      document.body.appendChild(d);
    };
    const origErr = console.error;
    console.error = function() {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:100px;left:0;z-index:999999;background:orange;color:white;padding:10px;width:100%;font-size:14px;';
      d.innerHTML = '<b>CONSOLE.ERROR:</b> ' + Array.from(arguments).join(' ');
      document.body.appendChild(d);
      origErr.apply(console, arguments);
    };
  </script>
</head>

<body>
  <div id="app"></div>

</body>
